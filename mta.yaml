_schema-version: "3.1"
ID: manage-role
description: Manage-Role — app-managed authorization (function scope + data scope)
version: 1.0.0

modules:

# ── CAP Backend ──────────────────────────────────────────────
- name: manage-role-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: manage-role-auth
  - name: manage-role-db
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    disk-quota: 512M
    memory: 256M
  build-parameters:
    builder: npm
    ignore:
    - .env
    - default-*.json

# ── HANA DB Deployer ─────────────────────────────────────────
- name: manage-role-db-deployer
  type: hdb
  path: gen/db
  requires:
  - name: manage-role-db
  parameters:
    buildpack: nodejs_buildpack
  build-parameters:
    builder: npm

# ── Standalone App Router ────────────────────────────────────
- name: manage-role-approuter
  type: approuter.nodejs
  path: approuter
  requires:
  - name: manage-role-auth
  - name: manage-role-destination
  - name: manage-role-html5-repo-runtime
  - name: srv-api
    group: destinations
    properties:
      forwardAuthToken: true
      name: manage-role-srv-api
      url: ~{srv-url}
  parameters:
    disk-quota: 256M
    memory: 128M
  build-parameters:
    builder: npm

# ── UI5 App (build → zip) ────────────────────────────────────
- name: managerole
  type: html5
  path: app/managerole
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []

# ── HTML5 App Content (push zip to html5-repo-host) ──────────
- name: manage-role-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: manage-role-html5-repo-host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - managerole.zip
      name: managerole
      target-path: resources/

# ── Destination Content (wires destinations) ─────────────────
- name: manage-role-destination-content
  type: com.sap.application.content
  requires:
  - name: manage-role-destination
    parameters:
      content-target: true
  - name: manage-role-auth
    parameters:
      service-key:
        name: manage-role-auth-key
  - name: manage-role-html5-repo-host
    parameters:
      service-key:
        name: manage-role-html5-repo-host-key
  - name: srv-api
  parameters:
    content:
      instance:
        destinations:
        - Authentication: OAuth2UserTokenExchange
          Name: manage-role-srv-api
          TokenServiceInstanceName: manage-role-auth
          TokenServiceKeyName: manage-role-auth-key
          URL: ~{srv-api/srv-url}
          sap.cloud.service: managerole
        - Name: manage-role-html5-repo-host
          ServiceInstanceName: manage-role-html5-repo-host
          ServiceKeyName: manage-role-html5-repo-host-key
          sap.cloud.service: managerole
        existing_destinations_policy: update
  build-parameters:
    no-source: true

resources:

# ── XSUAA ─────────────────────────────────────────────────────
- name: manage-role-auth
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      tenant-mode: dedicated
      xsappname: manage-role-${space}
    path: ./xs-security.json
    service: xsuaa
    service-plan: application

# ── HANA HDI Container ────────────────────────────────────────
- name: manage-role-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared

# ── HTML5 App Host (upload content) ──────────────────────────
- name: manage-role-html5-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-plan: app-host

# ── HTML5 App Runtime (serve via approuter) ───────────────────
- name: manage-role-html5-repo-runtime
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-plan: app-runtime

# ── Destination Service ───────────────────────────────────────
- name: manage-role-destination
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
    service: destination
    service-plan: lite

parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true

build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
